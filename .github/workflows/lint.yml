name: CI

# Temporarily disabled - enable by removing 'if: false' from jobs
on:
  pull_request:
    branches: [ main ]

jobs:
  ktlint:
    if: false  # Temporarily disabled
    name: Kotlin Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint check
        run: ./gradlew ktlintCheck --no-daemon

      - name: Upload ktlint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: app/build/reports/ktlint/
          retention-days: 7

  unit-tests:
    if: false  # Temporarily disabled
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: ktlint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests with coverage
        run: ./gradlew testDebugUnitTest jacocoTestReport --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/
          retention-days: 14

      - name: Generate coverage summary
        if: always()
        run: |
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/reports/jacoco/html/index.html ]; then
            # Extract overall coverage from the HTML
            coverage=$(grep -oP 'Total.*?<td class="ctr2" id="c\d+">\K[0-9]+%' app/build/reports/jacoco/html/index.html | head -1)
            echo "**Overall Line Coverage:** ${coverage:-N/A}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See the coverage-report artifact for detailed HTML report." >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report not found." >> $GITHUB_STEP_SUMMARY
          fi
